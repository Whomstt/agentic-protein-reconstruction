misc:
  seed: 42
  device: "auto"

mlm_model:
  profile: "esm_small" # switch this between esm_small and protbert
  profiles:
    esm_small:
      type: "esm"
      name: "facebook/esm2_t6_8M_UR50D"
      batch_size: 64 # batch size for scoring junctions - lower for larger models to avoid OOM errors
      max_length: 1024 # max sequence length for the MLM model
      beam_size: 100 # beam size for scoring junctions
      junction_window: 1 # number of residues masked at the start of the next fragment when scoring a junction
      validity_model:
        name: "facebook/esm2_t6_8M_UR50D" # ESM-2 model used for pseudo-perplexity validity scoring
        batch_size: 64 # batch size for masked-position scoring
        max_length: 1024 # maximum sequence length used for validity scoring
    protbert:
      type: "prot"
      name: "Rostlab/prot_bert"
      batch_size: 32 # ProtBert is heavier, so keep batches smaller
      max_length: 512 # ProtBert max sequence length
      beam_size: 100
      junction_window: 1
      validity_model:
        name: "Rostlab/prot_bert"
        batch_size: 32
        max_length: 512

folding_model:
  type: "esm"
  name: "facebook/esmfold_v1" # facebook/esmfold_v1

llm_model:
  profile: "microsoft_foundry" # switch this between microsoft_foundry and openai_api
  profiles:
    openai_api:
      kind: "openai"
      model: "gpt-5.4-mini" # OpenAI brain of the reasoning agent
      api_key_env: "OPENAI_API_KEY"
    microsoft_foundry:
      kind: "microsoft_foundry"
      model: "gpt-5-mini" # Azure Foundry deployment name
      endpoint_env: "AZURE_ENDPOINT"
      api_key_env: "AZURE_API_KEY"
      auth_mode: "auto" # auto prefers AZURE_API_KEY, otherwise uses DefaultAzureCredential
      token_scope: "https://ai.azure.com/.default"
  temperature: 0.0 # temperature for the LLM

search:
  max_iterations: 4 # fixed number of agentic refinement rounds
  validity_threshold: 12.0 # pseudo-perplexity threshold for an acceptable reconstruction
  beam_width_step: 25 # beam width adjustment step when the agent changes its search strategy

data: # Note: must rerun data processing steps if any of these parameters are changed
  organism: "ecoli" # select the active dataset to evaluate: ecoli, yeast, or mixture
  test_ratio: 0.2 # ratio of data to hold out for testing (0.2 means 20% test, 80% train)
  test_samples: 5 # number of protein records to evaluate in sequential/agentic runs
  replica_count: 5 # number of digestion replicas to generate per protein during preprocessing (rerun preprocessing if changed)
  missed_cleavage_ratio: 0.3 # base missed-cleavage ratio; K sites are sampled at 1.5x this rate
  raw_uniprot: "data/raw/uniprot_sprot.fasta"
  raw_ecoli_yeast: "data/raw/ecoli_yeast.fasta"
  fragmented_ecoli: "data/ecoli/fragmented_ecoli.jsonl"
  fragmented_yeast: "data/yeast/fragmented_yeast.jsonl"
  fragmented_mixture: "data/mixture/fragmented_mixture.jsonl"
  ecoli_train_split: "data/ecoli/ecoli_train.jsonl"
  yeast_train_split: "data/yeast/yeast_train.jsonl"
  mixture_train_split: "data/mixture/mixture_train.jsonl"
  ecoli_test_split: "data/ecoli/ecoli_test.jsonl"
  yeast_test_split: "data/yeast/yeast_test.jsonl"
  mixture_test_split: "data/mixture/mixture_test.jsonl"