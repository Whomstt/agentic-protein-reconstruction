# Single source of runtime config; all access goes through `from config import cfg`.
# Comments here stay to one line — deep rationale for the research knobs is in CLAUDE.md.

misc:
  seed: 42  # global RNG seed (random/numpy/torch) and sample-shuffle seed
  device: "auto"  # "auto" picks cuda if available, else cpu

# === Run mode (used when sweep.enabled is false) ===
run:
  method: "agentic"  # "agentic" (LLM-driven) or "sequential" (deterministic, no LLM)
  calling_mode: "single_call"  # "single_call" (LLM picks the 5 levers, harness runs tools) or "react" (LLM drives every tool call)
  iteration1_deterministic: true  # iteration 1 = fixed default levers with no LLM call -> the report's Deterministic arm

  # Matched-budget non-LLM control arm: same budget/pipeline/selection as the agent,
  # but levers chosen without the LLM. Isolates the LLM's reasoning; costs 0 LLM calls.
  control_baseline:
    enabled: true
    policy: "random"  # "random" (seeded uniform draw) or "grid" (fixed spread across the grid)
    lever_space:  # values the policy draws from; keep matched to the agent's plausible range
      junction_window: [1, 2, 3, 4, 5]
      search_mode: ["greedy", "beam"]
      beam_width: [10, 25, 50, 100, 200]
      edge_mode: ["hard", "soft"]
      confirmed_bonus: [0.0, 0.5, 1.0]

  report_oracle: true  # add the free Oracle-ceiling column (best candidate the agent generated, per metric)

# === Search budget + agent levers ===
search:
  max_iterations: 5  # agentic refinement rounds (fixed budget when == early_stop_patience)
  early_stop_patience: 5  # stop after N non-improving iterations; == max_iterations disables early stop
  improvement_margin: 0.0  # relative validity drop needed to replace the incumbent best; 0.0 = keep-best argmin

  default_levers:  # iteration-1 / fallback levers; also the pipeline-wide default for junction_window & beam_width
    junction_window: 1  # residues masked per junction when scoring
    search_mode: "greedy"  # "greedy" or "beam"
    beam_width: 25  # candidate orderings kept per beam step
    edge_mode: "hard"  # "hard" or "soft" handling of confirmed overlap edges
    confirmed_bonus: 0.0  # score bonus for confirmed edges (used when edge_mode = "soft")

  validity_junction_window: 5  # residues scored per junction for the selection signal
  validity_confirmed_penalty: 0.75  # weight on confirmed-adjacency disagreement in the selection signal

# === Data (changing organism/replica_count/missed_cleavage_ratio reruns preprocessing) ===
data:
  organism: "ecoli"  # "ecoli", "yeast", or "mixture"
  test_samples: 100  # evaluation samples per run (shuffled with misc.seed)
  replica_count: 100  # digestion replicas generated per protein
  missed_cleavage_ratio: 0.3  # base missed-cleavage rate (K sites sampled at 1.5x)
  raw_uniprot: "data/raw/uniprot_sprot.fasta"
  raw_ecoli_yeast: "data/raw/ecoli_yeast.fasta"
  fragmented_ecoli: "data/ecoli/fragmented_ecoli.jsonl"
  fragmented_yeast: "data/yeast/fragmented_yeast.jsonl"
  fragmented_mixture: "data/mixture/fragmented_mixture.jsonl"

# === Sweep (enabled: true loops the grid instead of a single run) ===
sweep:
  enabled: false
  test_samples: 100  # samples per combo
  grid:  # cartesian product of these axes (full axis-key list in CLAUDE.md)
    organism: [ecoli, yeast]
    replica_count: [5, 20, 100]
    mlm_profile: [esm_small]
  extra_runs: []  # one-off combos appended to the grid

# === LLM (the lever-choosing model for agentic runs) ===
llm_model:
  profile: "microsoft_foundry"  # "microsoft_foundry" or "openai_api"
  sampling:  # only non-null knobs are sent to the model
    temperature: null  # leave null for reasoning models (they reject non-default values)
    top_p: null  # leave null for reasoning models
    top_k: null  # non-OpenAI backends only; ignored otherwise
    seed: 42  # best-effort determinism of the LLM's lever choices
    reasoning_effort: "low"  # minimal | low | medium | high
    verbosity: "low"  # low | medium | high
  profiles:
    openai_api:
      kind: "openai"
      model: "gpt-5.4-mini"
      api_key_env: "OPENAI_API_KEY"
    microsoft_foundry:
      kind: "microsoft_foundry"
      model: "gpt-5-mini"  # Azure Foundry deployment name
      endpoint_env: "AZURE_ENDPOINT"
      api_key_env: "AZURE_API_KEY"
      auth_mode: "auto"  # "auto" prefers AZURE_API_KEY, else DefaultAzureCredential
      token_scope: "https://ai.azure.com/.default"

# === MLM (junction + validity scoring model) ===
mlm_model:
  profile: "esm_small"  # "esm_small", "esm_medium", or "protbert"
  profiles:
    esm_small:
      type: "esm"
      name: "facebook/esm2_t6_8M_UR50D"
      batch_size: 64
      max_length: 1024
      validity_model:
        name: "facebook/esm2_t6_8M_UR50D"
        batch_size: 64
        max_length: 1024
    esm_medium:
      type: "esm"
      name: "facebook/esm2_t33_650M_UR50D"
      batch_size: 8  # ~25x heavier than esm_small; small batch to fit alongside the validity model
      max_length: 1024
      validity_model:
        name: "facebook/esm2_t33_650M_UR50D"
        batch_size: 8
        max_length: 1024
    protbert:
      type: "prot"
      name: "Rostlab/prot_bert"
      batch_size: 32
      max_length: 512
      validity_model:
        name: "Rostlab/prot_bert"
        batch_size: 32
        max_length: 512

# === Folding (optional structural scoring) ===
folding_model:
  type: "esm"
  name: "facebook/esmfold_v1"
