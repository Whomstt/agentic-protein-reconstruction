misc:
  seed: 42
  device: "auto"

run: # main.py reads this to decide what to run when sweep.enabled is false
  method: "agentic" # "agentic" (LLM-driven iterative agent) or "sequential" (deterministic pipeline, no LLM)

mlm_model:
  profile: "esm_small" # switch this between esm_small and protbert
  profiles:
    esm_small:
      type: "esm"
      name: "facebook/esm2_t6_8M_UR50D"
      batch_size: 64 # batch size for scoring junctions - lower for larger models to avoid OOM errors
      max_length: 1024 # max sequence length for the MLM model
      beam_width: 100 # default number of candidate orderings kept at each step of beam_order's beam search
      junction_window: 1 # number of residues masked at the start of the next fragment when scoring a junction
      validity_model:
        name: "facebook/esm2_t6_8M_UR50D" # ESM-2 model used for pseudo-perplexity validity scoring
        batch_size: 64 # batch size for masked-position scoring
        max_length: 1024 # maximum sequence length used for validity scoring
    protbert:
      type: "prot"
      name: "Rostlab/prot_bert"
      batch_size: 32 # ProtBert is heavier, so keep batches smaller
      max_length: 512 # ProtBert max sequence length
      beam_width: 100
      junction_window: 1
      validity_model:
        name: "Rostlab/prot_bert"
        batch_size: 32
        max_length: 512

folding_model:
  type: "esm"
  name: "facebook/esmfold_v1" # facebook/esmfold_v1

llm_model:
  profile: "microsoft_foundry" # switch this between microsoft_foundry and openai_api
  profiles:
    openai_api:
      kind: "openai"
      model: "gpt-5.4-mini" # OpenAI brain of the reasoning agent
      api_key_env: "OPENAI_API_KEY"
    microsoft_foundry:
      kind: "microsoft_foundry"
      model: "gpt-5-mini" # Azure Foundry deployment name
      endpoint_env: "AZURE_ENDPOINT"
      api_key_env: "AZURE_API_KEY"
      auth_mode: "auto" # auto prefers AZURE_API_KEY, otherwise uses DefaultAzureCredential
      token_scope: "https://ai.azure.com/.default"
  temperature: 0.0 # temperature for the LLM

search:
  max_iterations: 3 # fixed number of agentic refinement rounds
  early_stop_patience: 3 # set equal to max_iterations to disable early stopping entirely (non-improving streak can never reach max_iterations within the iteration budget) - every sample now always runs all 3 iterations, so first-pass-vs-best comparisons are consistent across samples
  beam_width_step: 25 # beam width adjustment step when the agent changes its search strategy

data: # organism, replica_count, missed_cleavage_ratio require rerunning preprocessing
  organism: "ecoli" # active dataset: ecoli, yeast, or mixture
  test_samples: 3 # samples drawn per run, shuffled with misc.seed
  replica_count: 5 # number of digestion replicas to generate per protein during preprocessing
  missed_cleavage_ratio: 0.3 # base missed-cleavage ratio; K sites are sampled at 1.5x this rate
  raw_uniprot: "data/raw/uniprot_sprot.fasta"
  raw_ecoli_yeast: "data/raw/ecoli_yeast.fasta"
  fragmented_ecoli: "data/ecoli/fragmented_ecoli.jsonl"
  fragmented_yeast: "data/yeast/fragmented_yeast.jsonl"
  fragmented_mixture: "data/mixture/fragmented_mixture.jsonl"

sweep: # main.py reads this; enabled: false runs once via run.method above ("current" mode)
  enabled: true # true = loop every combination in grid (+ extra_runs) instead of running once
  test_samples: 5 # samples per combo when sweep is enabled (each combo gets its own results/ folder)
  # cartesian product of the axes below: 2 organisms x 3 replica_counts x 2 mlm_profiles = 12 combos.
  # organism/replica_count listed before mlm_profile, since only those two trigger reprocessing.
  grid:
    organism: [ecoli] # ecoli, yeast, mixture
    replica_count: [5, 20, 100]
    mlm_profile: [esm_small] # esm_small, protbert
  extra_runs: [] # one-off combos, e.g. [{organism: mixture, replica_count: 5, mlm_profile: esm_small, method: sequential, test_samples: 5}]