misc:
  seed: 42
  device: "auto"

run: # what main.py runs when sweep.enabled is false; most commonly tuned run-mode knobs live here
  method: "agentic" # "agentic" (LLM-driven) or "sequential" (deterministic, no LLM)
  calling_mode: "single_call" # "react" = LLM drives every tool call (~4-6 calls/iteration); "single_call" = harness runs the tool pipeline, LLM only picks the 5 levers (see CLAUDE.md)
  iteration1_deterministic: true # true = iteration 1 uses search.default_levers with no LLM call (cheaper; "1st Iteration" in reports means "config defaults"); false = iteration 1 is also a genuine LLM lever choice (every round is agentic; "1st Iteration" means "LLM's first attempt") — see CLAUDE.md for the research-validity tradeoff

search:
  max_iterations: 3 # number of agentic refinement rounds

  default_levers: # iteration-1 lever values when run.iteration1_deterministic; fallback for unset levers in react mode; also the sole default for junction_window/beam_width across the whole pipeline (sequential mode included)
    junction_window: 1 # residues masked when scoring a junction
    search_mode: "greedy" # "beam" or "greedy"
    beam_width: 25 # candidate orderings kept per beam_order step
    edge_mode: "hard" # "hard" or "soft"
    confirmed_bonus: 0.0

  early_stop_patience: 3 # non-improving iterations before stopping early; == max_iterations disables early stopping
  beam_width_step: 25 # suggested beam-width adjustment granularity for the agent
  improvement_margin: 0.030 # relative validity drop a later iteration must clear to replace the incumbent best; 0.0 = raw argmin (see CLAUDE.md; tuned on non-disjoint data — treat as a disclosed sensitivity choice, not a validated constant)

  # best-candidate selection signal (validity_scorer); see CLAUDE.md for the full formula
  validity_junction_window: 5 # residues scored per junction for the validity signal
  validity_confirmed_penalty: 0.75 # weight on confirmed-adjacency disagreement

data: # organism/replica_count/missed_cleavage_ratio require rerunning preprocessing
  organism: "ecoli" # ecoli, yeast, or mixture
  test_samples: 5 # samples drawn per run, shuffled with misc.seed
  replica_count: 5 # digestion replicas generated per protein
  missed_cleavage_ratio: 0.3 # base rate; K sites sampled at 1.5x this
  raw_uniprot: "data/raw/uniprot_sprot.fasta"
  raw_ecoli_yeast: "data/raw/ecoli_yeast.fasta"
  fragmented_ecoli: "data/ecoli/fragmented_ecoli.jsonl"
  fragmented_yeast: "data/yeast/fragmented_yeast.jsonl"
  fragmented_mixture: "data/mixture/fragmented_mixture.jsonl"

sweep: # main.py reads this; enabled: false runs once via run.method above
  enabled: false
  test_samples: 5 # samples per combo
  grid: # cartesian product of the axes below
    organism: [ecoli, yeast]
    replica_count: [5, 20, 100]
    mlm_profile: [esm_small]
  extra_runs: [] # one-off combos, e.g. [{organism: mixture, replica_count: 5, mlm_profile: esm_small, method: sequential, test_samples: 5}]

llm_model:
  profile: "microsoft_foundry" # microsoft_foundry or openai_api
  temperature: 0.0
  profiles:
    openai_api:
      kind: "openai"
      model: "gpt-5.4-mini"
      api_key_env: "OPENAI_API_KEY"
    microsoft_foundry:
      kind: "microsoft_foundry"
      model: "gpt-5-mini" # Azure Foundry deployment name
      endpoint_env: "AZURE_ENDPOINT"
      api_key_env: "AZURE_API_KEY"
      auth_mode: "auto" # auto prefers AZURE_API_KEY, else DefaultAzureCredential
      token_scope: "https://ai.azure.com/.default"

mlm_model:
  profile: "esm_small" # esm_small, esm_medium, or protbert
  profiles:
    esm_small:
      type: "esm"
      name: "facebook/esm2_t6_8M_UR50D"
      batch_size: 64
      max_length: 1024
      validity_model:
        name: "facebook/esm2_t6_8M_UR50D"
        batch_size: 64
        max_length: 1024
    esm_medium:
      type: "esm"
      name: "facebook/esm2_t33_650M_UR50D"
      batch_size: 8 # ~25x heavier than esm_small; keep batch small to fit alongside validity model on ~8GB VRAM
      max_length: 1024
      validity_model:
        name: "facebook/esm2_t33_650M_UR50D"
        batch_size: 8
        max_length: 1024
    protbert:
      type: "prot"
      name: "Rostlab/prot_bert"
      batch_size: 32
      max_length: 512
      validity_model:
        name: "Rostlab/prot_bert"
        batch_size: 32
        max_length: 512

folding_model:
  type: "esm"
  name: "facebook/esmfold_v1"
